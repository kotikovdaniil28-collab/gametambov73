    function randomFunnyNick() { 
        const funnyLeft = ["Мелстройность", "Смешнявка", "Макенза", "Сраупен", "бурмалда", "Рассыльщик", "ПолитТоксик", "РелигБаттл", "Дед_с_Клавой"];
        const funnyRight = ["из_Тамбова", "без_микрофона", "на_ГлОбАнЕ", "в_муте", "с_баном", "тянет_конфу", "обижен", "любит_капс", "ищет_баги"];
        return `${funnyLeft[Math.floor(Math.random() * funnyLeft.length)]}_${funnyRight[Math.floor(Math.random() * funnyRight.length)]}#${Math.floor(1000 + Math.random() * 8999)}`;
    }
    
    function shuffleArray(array) { 
        for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } 
    }
    
    function initials(name) { return name.split(/[#_\s]+/).filter(Boolean).slice(0, 2).map(part => part[0]).join("").toUpperCase(); }
    function calcXP(value) { return Math.floor(Number(value) / 10) * 15; }
    function availableXp() { return Math.max(0, calcXP(state.correct) + Number(state.reportXp || 0) - Number(shopState.spent || 0)); }
    function availablePts() { return Math.max(0, calcXP(supportState.correct) - Number(shopState.apSpent || 0)); }

    let lastActionTime = 0, spamWarnings = 0, spamTimerInterval = null;
    function isSpamming() {
        const now = Date.now();
        const blockUntil = localStorage.getItem('spam_block_until');
        if (blockUntil && now < blockUntil) return true;
        if (now - lastActionTime < 1000) {
            spamWarnings++;
            if (spamWarnings >= 3) {
                const penaltyTime = now + 60000;
                localStorage.setItem('spam_block_until', penaltyTime);
                showSpamModalWithTimer(); spamWarnings = 0; return true;
            }
        } else { spamWarnings = Math.max(0, spamWarnings - 1); }
        lastActionTime = now; return false;
    }

    function showSpamModalWithTimer() {
        const blockUntil = localStorage.getItem('spam_block_until');
        if (!blockUntil) return;
        const modal = document.getElementById('spamModal'), closeBtn = document.getElementById('closeSpamModal');
        modal.style.display = 'flex'; closeBtn.disabled = true; closeBtn.style.opacity = '0.5'; closeBtn.style.cursor = 'not-allowed';
        let timeLeft = Math.ceil((blockUntil - Date.now()) / 1000); if (timeLeft < 0) timeLeft = 60;
        closeBtn.textContent = `Блокировка: ${timeLeft} сек...`; clearInterval(spamTimerInterval);
        spamTimerInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) { clearInterval(spamTimerInterval); localStorage.removeItem('spam_block_until'); closeBtn.disabled = false; closeBtn.style.opacity = '1'; closeBtn.style.cursor = 'pointer'; closeBtn.textContent = 'Я понял, больше не буду'; } 
            else closeBtn.textContent = `Блокировка: ${timeLeft} сек...`;
        }, 1000);
    }

    function pushLog(text) { state.log.unshift(text); state.log = state.log.slice(0, 50); renderLogs(); }

    }

    function randomMessage() {
        if (modQueue.length === 0) { modQueue = allModMessages.map((_, i) => i); shuffleArray(modQueue); }

        const item = allComplaints[compQueue.pop()]; complaintState.current = item;

    }

    window.judge = function(action) {
        if (!state.started || !state.current) { startGame(); return; }
        if (isSpamming()) return;
        const isCorrect = action === state.current.type; state.resolved++;
        if (isCorrect) { state.correct++; playSound('ok'); pushLog(`✅ Тренажёр: верное решение (${action.toUpperCase()})`); }

    // Авторизация Модалки
    document.getElementById('accessSubmitBtn')?.addEventListener('click', async () => {
        const val = document.getElementById('accessCodeInput').value.trim(); const err = document.getElementById('accessErrorMsg'); const btn = document.getElementById('accessSubmitBtn'); btn.disabled = true; btn.textContent = "Проверка...";
        if (pendingAction.type === 'switch_tab_shop' && val === 'JohnWickModer') { localStorage.setItem('access_shop', 'true'); hasAccessCode = true; finishAccess(true, 'shop'); return; }
        if (pendingAction.type === 'switch_tab_report' && val === 'JohnWIckTopModer') { localStorage.setItem('access_report', 'true'); hasReportAccessCode = true; finishAccess(true, 'report'); return; }
        if (pendingAction.type === 'switch_tab_ap_shop' && val === 'ApMasterKey123') { localStorage.setItem('access_ap_shop', 'true'); hasApShopAccess = true; finishAccess(true, 'ap_shop'); return; }
        
        const { data } = await supa.from('reports').select('*').eq('email', 'ACCESS_KEY').eq('link', val);
        if (data && data.length > 0) { 
            const keyData = data[0];
            if (pendingAction.type === 'switch_tab_shop' && keyData.status === 'shop') { localStorage.setItem('access_shop', 'true'); hasAccessCode = true; finishAccess(true, 'shop'); } 
            else if (pendingAction.type === 'switch_tab_report' && keyData.status === 'report') { localStorage.setItem('access_report', 'true'); hasReportAccessCode = true; finishAccess(true, 'report'); } 
            else if (pendingAction.type === 'switch_tab_ap_shop' && keyData.status === 'ap_shop') { localStorage.setItem('access_ap_shop', 'true'); hasApShopAccess = true; finishAccess(true, 'ap_shop'); } 
            else finishAccess(false);
        } else finishAccess(false);

        function finishAccess(success, roleMode) { 
            btn.disabled = false; btn.textContent = "Подтвердить";
            if (success) { document.getElementById('accessModal').style.display = 'none'; switchMode(roleMode, pendingAction.btn); pendingAction = null; } 
            else err.style.display = 'block';
        }
    });

    document.getElementById('accessCloseBtn')?.addEventListener('click', () => { document.getElementById('accessModal').style.display = 'none'; pendingAction = null; });
    document.getElementById('loginBtnUI').onclick = () => { document.getElementById('authModal').style.display = 'flex'; document.getElementById('authErrorMsg').style.display = 'none'; };
    document.getElementById('authCloseModal').onclick = () => { document.getElementById('authModal').style.display = 'none'; };
    document.getElementById('logoutBtnUI').onclick = async () => { await supa.auth.signOut(); location.reload(); };
    document.getElementById('authLoginSubmit').onclick = async () => {
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value; const err = document.getElementById('authErrorMsg');
        if(!email || !password) { err.textContent = "Введите Email и Пароль!"; err.style.display = 'block'; return; }
        const { error } = await supa.auth.signInWithPassword({ email, password });
        if(error) { err.textContent = error.message; err.style.display = 'block'; } 
        else document.getElementById('authModal').style.display = 'none';
    };

    document.getElementById('authRegisterSubmit').onclick = async () => {
        const email = document.getElementById('authEmail').value;
        const nickname = document.getElementById('authNickname').value; const password = document.getElementById('authPassword').value; const err = document.getElementById('authErrorMsg');
        if(!email || !password || !nickname) { err.textContent = "Заполните все поля, включая Никнейм!"; err.style.display = 'block'; return; }
        const { error } = await supa.auth.signUp({ email, password, options: { data: { nickname: nickname } } });
        if(error) { err.textContent = error.message; err.style.display = 'block'; } 
        else { err.textContent = "Успешно! Теперь войдите."; err.style.color = "var(--color-success)"; err.style.display = 'block'; }
    };

    document.getElementById('forceNicknameBtn')?.addEventListener('click', async () => {
        const val = document.getElementById('forceNicknameInput').value.trim(); if (val.length < 3) return alert("Никнейм должен быть длиннее 3 символов!");
        await supa.auth.updateUser({ data: { nickname: val } }); if (currentUser) await supa.from('user_stats').update({ nickname: val }).eq('user_id', currentUser.id);
        currentNickname = val; document.getElementById('userEmailDisplay').textContent = val; document.getElementById('nicknameModal').style.display = 'none'; 
        if(!state.started && document.getElementById("authorName")?.textContent === "System") startGame();
    });

    // Запуск кнопок симулятора
    document.querySelectorAll('[data-action]').forEach(btn => { btn.onclick = () => judge(btn.dataset.action); });
    document.querySelectorAll('[data-comp-action]').forEach(btn => { btn.onclick = () => judgeComplaint(btn.dataset.compAction); });
    const sb = document.getElementById('startBtn'); if (sb) sb.onclick = startGame;
    const rb = document.getElementById('resetBtn'); if (rb) rb.onclick = resetGame;
    
    const themeBtn = document.querySelector('[data-theme-toggle]');
    if(themeBtn) { 
        themeBtn.onclick = () => { 
            const root = document.documentElement;
            if(root.getAttribute('data-theme') === 'dark') { root.setAttribute('data-theme', 'light'); themeBtn.textContent = '☀️'; } 
            else { root.setAttribute('data-theme', 'dark'); themeBtn.textContent = '🌙'; } 
        };
    }

    renderShopItems(); renderApShopItems();
    renderQuests(); renderRight("moderation");

    supa.auth.getSession().then(async ({ data: { session } }) => { 
        currentUser = session?.user || null;
        if (currentUser) {
            currentNickname = currentUser.user_metadata?.nickname; 
            document.getElementById('userEmailDisplay').textContent = currentNickname || currentUser.email; 
            document.getElementById('loginBtnUI').style.display = 'none'; 
            document.getElementById('logoutBtnUI').style.display = 'inline-block'; 
            document.getElementById('authModal').style.display = 'none'; 
      
            const { data: adminRoles } = await supa.from('reports').select('*').eq('email', 'ADMIN_ROLE');
            if(adminRoles) {
                dynamicModLeaders = adminRoles.filter(r => r.status === 'leadership').map(r => r.link);
                dynamicApLeaders = adminRoles.filter(r => r.status === 'ap_admin').map(r => r.link);
            }

            const isCreator = currentUser.email === creatorEmail;
            const isModLeader = isCreator || adminEmails.includes(currentUser.email) || dynamicModLeaders.includes(currentUser.id); 
            const isApLeader = isCreator || apLeadershipEmails.includes(currentUser.email) || dynamicApLeaders.includes(currentUser.id);
            
            if (isCreator) document.getElementById('creatorTabBtn').style.display = 'inline-block';
            if (isModLeader) { 
                document.getElementById('leadershipTabBtn').style.display = 'inline-block';
                document.getElementById('adminLogTabBtn').style.display = 'inline-block';
            }
            if (isApLeader) { 
                document.getElementById('apAdminTabBtn').style.display = 'inline-block';
                document.getElementById('apAdminLogTabBtn').style.display = 'inline-block'; 
            }

            supa.from('user_stats').select('*').eq('user_id', currentUser.id).single().then(({data}) => {
                if(data) { 
                    state.resolved = Number(data.mod_resolved) || 0; state.correct = Number(data.mod_correct) || 0; state.mistakes = Number(data.mod_mistakes) || 0; 
                    supportState.resolved = Number(data.sup_resolved) || 0; supportState.correct = Number(data.sup_correct) || 0; supportState.mistakes = Number(data.sup_mistakes) || 0; 
                    shopState.spent = Number(data.shop_spent) || 0; shopState.apSpent = Number(data.ap_spent) || 0; 
                }
            
                supa.from('reports').select('xp').eq('email', currentUser.email).then(({data: repData}) => { 
                    state.reportXp = 0; 
                    if (repData) state.reportXp = repData.reduce((sum, r) => sum + (Number(r.xp) || 0), 0); 
                    updateModStats(); updateSupportStats(); updateShopStats(); checkReportAccess(); 
                    if(!currentNickname) document.getElementById('nicknameModal').style.display = 'flex'; 
                });
            });
            if(isCreator) loadCreatorPanelData();
        } else { 
            checkReportAccess();
        }
    });
}); 
</script>
